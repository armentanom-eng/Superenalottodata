name: Auto Update Superenalotto

on:
 workflow_dispatch: # Ti permette di lanciarlo a mano
 schedule:
   - cron: '0 7 * * *' # Gira automaticamente ogni sera (9:00 italiane)

jobs:
 build:
   runs-on: ubuntu-latest

   # Manteniamo i permessi che hai in image_71.png per salvare il file
   permissions:
     contents: write

   steps:
     - name: Checkout repository
       uses: actions/checkout@v4 # Aggiornato da v3 a v4 per togliere l'avviso

     - name: Set up Python
       uses: actions/setup-python@v5 # Aggiornato da v4 a v5 per togliere l'avviso
       with:
         python-version: '3.x'

     - name: Install dependencies
       run: |
         python -m pip install --upgrade pip
         pip install requests beautifulsoup4

     - name: Run update script
       run: python update_data.py

     - name: Commit and push changes
       run: |
         git config --global user.name "GitHub Action"
         git config --global user.email "action@github.com"
         git add storico_completo.csv
         git commit -m "Aggiornamento automatico estrazione" || exit 0
         git push origin main
