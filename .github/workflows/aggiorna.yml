name: Auto Update Superenalotto

on:
 workflow_dispatch: # Ti permette di lanciarlo a mano premendo il tasto
 schedule:
   - cron: '0 7 * * *' # Gira automaticamente ogni sera alle 21:00

jobs:
 build:
   runs-on: ubuntu-latest

   # Permessi necessari per permettere all'Action di salvare il file nel tuo repository
   permissions:
     contents: write

   steps:
     - name: Checkout repository
       uses: actions/checkout@v3

     - name: Set up Python
       uses: actions/setup-python@v4
       with:
         python-version: '3.x'

     # Questo è il pezzo che mancava: installa i "motori" per lo script
     - name: Install dependencies
       run: |
         python -m pip install --upgrade pip
         pip install requests beautifulsoup4

     # Lancia lo script Python che scansiona FrankNet
     - name: Run update script
       run: python update_data.py

     # Prende il file CSV modificato e lo carica definitivamente su GitHub
     - name: Commit and push changes
       run: |
         git config --global user.name "GitHub Action"
         git config --global user.email "action@github.com"
         git add storico_completo.csv
         git commit -m "Aggiornamento automatico estrazione" || exit 0
         git push origin main
