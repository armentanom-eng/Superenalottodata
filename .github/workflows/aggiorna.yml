name: Auto Update Superenalotto

on:
 schedule:
   # Gira alle 21:10 italiane (19:10 UTC) nei giorni di estrazione
   - cron: '10 19 * * 2,4,5,6'
 workflow_dispatch: # Questo abilita il tasto per farlo partire a mano

jobs:
 build:
   runs-on: ubuntu-latest
   steps:
     - name: Checkout del codice
       uses: actions/checkout@v3

     - name: Configura Python
       uses: actions/setup-python@v4
       with:
         python-version: '3.9'

     - name: Installa pacchetti
       run: pip install requests

     - name: Esegui aggiornamento
       run: python update_data.py

     - name: Salva i dati nel CSV
       run: |
         git config --global user.name "GitHub Action"
         git config --global user.email "action@github.com"
         git add storico_completo.csv
         git commit -m "Aggiunta estrazione automatica" || exit 0
         git push
